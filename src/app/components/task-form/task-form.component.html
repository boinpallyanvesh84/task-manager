<form class="task-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <h2 class="task-form__title">{{ isEditing ? 'Edit Task' : 'Add Task' }}</h2>

  <div class="task-form__field">
    <label for="title">Title <span class="required">*</span></label>
    <input
      id="title"
      type="text"
      formControlName="title"
      placeholder="Enter task title"
      [class.invalid]="titleControl.invalid && titleControl.touched"
    />
    @if (titleControl.invalid && titleControl.touched) {
      <span class="error">Title is required.</span>
    }
  </div>

  <div class="task-form__field">
    <label for="description">Description</label>
    <textarea
      id="description"
      formControlName="description"
      placeholder="Enter task description (optional)"
      rows="3"
    ></textarea>
  </div>

  <div class="task-form__field">
    <label for="status">Status</label>
    <select id="status" formControlName="status">
      @for (status of statuses; track status) {
        <option [value]="status">{{ status }}</option>
      }
    </select>
  </div>

  <div class="task-form__actions">
    <button type="submit" class="btn btn--primary">
      {{ isEditing ? 'Save Changes' : 'Add Task' }}
    </button>
    <button type="button" class="btn btn--secondary" (click)="onCancel()">Cancel</button>
  </div>
</form>
