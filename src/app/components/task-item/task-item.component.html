<article class="task-card">
  <div class="task-card__header">
    <span class="task-card__avatar" [style.background-color]="avatarColor">
      {{ avatarInitial }}
    </span>

    <div class="task-card__actions">
      <button type="button" class="icon-only-btn" (click)="onEdit()" aria-label="Edit task">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z" />
        </svg>
      </button>
      <button type="button" class="icon-only-btn" (click)="onDelete()" aria-label="Delete task">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 7h16" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
          <path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12" />
          <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
        </svg>
      </button>
    </div>
  </div>

  <h3 class="task-card__title">{{ task.title }}</h3>

  @if (task.description) {
    <p class="task-card__description">{{ task.description }}</p>
  }
</article>
